name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Download Go modules
        run: go mod download

      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Sync vendor
        run: go mod vendor

      - name: Run unit tests
        run: go test -mod=vendor -race ./...

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: go_pg_queue
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Sync vendor
        run: go mod vendor

      - name: Write config
        run: |
          cat > config.yml <<'EOF'
          database:
            hosts:
              - localhost
            port: 5432
            user: postgres
            password: postgres
            name: go_pg_queue
            sslmode: disable
          EOF

      - name: Run integration tests
        run: go test -mod=vendor -race -tags integration -p 1 ./...

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t go-pg-jobqueue:ci .
