services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: go_pg_queue
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d go_pg_queue"]
      interval: 5s
      timeout: 5s
      retries: 10

  jqcli:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./csv:/app/csv
      - ./logs:/app/logs
